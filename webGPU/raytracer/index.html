<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>dope</title>
  <style>
    body {
      margin: 0;
      display: flex;
      flex-direction: column;
      height: 100vh;
      user-select: none;
      touch-action: pinch-zoom;
    }
    canvas {
      margin: auto;
      pointer-events: all;
      width: 100%;
      height: 100%;
    }
    div.abs {
      position: absolute;
      display: flex;
      width: 100%;
      height: 100%;
      pointer-events: none;
      margin: 0;
    }
    #info {
      position: absolute;
      top: 0;
      left: 0;
      margin: 0;
      padding: 0.5em;
      background-color: rgba(0, 0, 0, 0.8);
      color: white;
    }
  </style>
  <script type="importmap">
    {
      "imports": {
        "gl-matrix": "../../node_modules/gl-matrix/esm/index.js",
        "webgpu-utils": "../../node_modules/webgpu-utils/dist/2.x/webgpu-utils.module.js"
      }
    }
  </script>
  <script type="module">
    import GUI from 'https://cdn.jsdelivr.net/npm/lil-gui@0.20/+esm';
    import { RaytraceRenderer } from './raytrace-renderer.js';
    import { fromObjFile } from '../obj-loader.js';

    const renderer = new RaytraceRenderer({
      models: [
        fromObjFile('/models/lightcube.obj', {position: [-0.75, 0.45, -4.5], scale: [1.5, 0.05, 1.5]}),
        fromObjFile('/models/cornell_box.obj', {position: [0, -0.5, -2], scale: [2, 1, 3]}),
        fromObjFile('/models/Knight/Knight.obj', {scale: 0.002, position: [0, -0.5, -3.5]}),
        fromObjFile('/models/icosahedron_calc_normals.obj', {position: [-0.5, -0.25, -3], scale: 0.3, rotateX: Math.PI / 8}),
        fromObjFile('/models/cube.obj', {position: [0.4, -0.5, -3], scale: 0.3, rotateY: Math.PI / 6}),
        // fromObjFile('/models/car.obj', {scale: 0.3, position: [0, -.5, -3], rotateY: -Math.PI / 2}),
        // fromObjFile('/models/cube.obj', {position: [-0.15, -0.5, -2.5], scale: 0.3}),
        // fromObjFile('/models/shuttle_calc_normals.obj', {scale: 0.1, position: [0, -0.1, -3], rotateX: -Math.PI / 2, rotateY: Math.PI / 8}),

        // fromObjFile('/models/bmw/bmw.obj', {position: [0, -0.55, -4], scale: 0.08}),

        // fromObjFile('/models/lightcube.obj', {position: [-1.5, 1.5, -14], scale: [5, 0.05, 5]}),
        // fromObjFile('/models/ikea/ikea.obj', {scale: 0.004, position: [0, -3, -10]}),

        // fromObjFile('/models/InteriorTest/InteriorTest.obj', {position: [0, -1, 0]}),

        // fromObjFile('/models/breakfast_room/breakfast_room.obj', {position: [0, -2, -8]}),
        // fromObjFile('/models/lightcube.obj', {position: [-2.4, 1.6, -10.2], scale: 0.45}),
        // fromObjFile('/models/lightcube.obj', {position: [0.75, 1.6, -10.2], scale: 0.45}),

        // fromObjFile('/models/living_room/living_room.obj', { position: [0, -1.5, -5], }),
      ]
    });
    const gui = new GUI();

    const lighting = gui.addFolder('Lighting').close();
    lighting.addColor(renderer, 'environmentLight');

    const debug = gui.addFolder('Debug').close();
    debug.add(renderer, 'heatMapThreshold', 10, 2000, 10);
    debug.add(renderer, 'heatMap');
    debug.add(renderer, 'frameAccumulator');

    gui.add(renderer, 'pauseRendering');

    renderer.start();
  </script>
</head>
<body>
  <div class="abs">
    <canvas></canvas>
    <pre id="info"></pre>
  </div>
</body>
</html>
