<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>dope</title>
  <style>
    body {
      margin: 0;
      display: flex;
      flex-direction: column;
      height: 100vh;
      user-select: none;
      touch-action: pinch-zoom;
    }
    canvas {
      margin: auto;
      pointer-events: all;
      width: 100%;
      height: 100%;
    }
    div.abs {
      position: absolute;
      display: flex;
      width: 100%;
      height: 100%;
      pointer-events: none;
      margin: 0;
    }
  </style>
  <script type="importmap">
    {
      "imports": {
        "gl-matrix": "../node_modules/gl-matrix/esm/index.js"
      }
    }
  </script>
  <script type="module">
    import GUI from 'https://cdn.jsdelivr.net/npm/lil-gui@0.20/+esm';
    import { BasicRenderer } from './renderer.js';
    import { RaytraceRenderer } from './raytrace-renderer.js';
    import { fromObjFile } from './obj-loader.js';

    const renderer = new RaytraceRenderer({
      models: [
        fromObjFile('/models/lightcube.obj', {position: [-0.125, 0.3, -2.75], scale: 0.25}),
        fromObjFile('/models/cornell_box.obj', {position: [0, -0.5, -2]}),
        fromObjFile('/models/icosahedron_calc_normals.obj', {position: [-0.2, -0.3, -2.7], scale: 0.3}),
        fromObjFile('/models/cube.obj', {position: [0, -0.5, -2.5], scale: 0.3, rotateY: Math.PI / 6}),
      ]
    });
    // const renderer = new BasicRenderer(fromObjFile('../models/car.obj', {position: [0, -1.5, -5], }));
    const gui = new GUI();
    gui.add(renderer, 'frameAccumulator');
    renderer.start();
  </script>
</head>
<body>
  <div class="abs">
    <canvas></canvas>
  </div>
</body>
</html>
